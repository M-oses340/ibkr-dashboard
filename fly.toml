app = "ibkr-web-api"
primary_region = "iad"

[build]

[env]
  IBKR_ACCOUNT_ID = "DUP158699"

[http_service]
  internal_port = 5056
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 5055

  [[services.ports]]
    port = 5055

[[services]]
  protocol = "tcp"
  internal_port = 5056

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
